spring.application.name=leave-management-system
server.port=${PORT:3000}

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_DATABASE:leave_management_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password1234}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

jwt.secret=${JWT_SECRET:kingmeka1234kingmeka1234kingmeka1234kingmeka1234}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

frontend.url=${FRONTEND_URL:http://localhost:5173}

aws.region=${AWS_REGION:af-south-1}
aws.s3.bucket=${AWS_S3_BUCKET:leaveflow-documents}
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}
app.upload.max-file-size-bytes=${MAX_UPLOAD_BYTES:5242880}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
